stages:
  - test
  - deploy

variables:
  # Non-TLS dind: TLS would need the runner's config.toml to mount a shared
  # /certs volume between the job and the docker:dind service, which this
  # runner isn't set up for (docker build fails with
  # "open /certs/client/ca.pem: no such file or directory" otherwise).
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

# Build and test in one job: saving the built image (docker save) and passing
# it to a separate job as a GitLab artifact hit the instance's artifact size
# limit (413 Request Entity Too Large) since the image bundles a full conda
# env. Keeping the image local to a single job's dind daemon avoids that
# entirely, at the cost of not caching the built image between stages.
test:
  stage: test
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -f ci/Dockerfile -t marapendi:ci .
    - docker run marapendi:ci python -c "import marapendi; print('OK')"
    - docker run marapendi:ci pytest --cov=marapendi

pages:
  stage: deploy
  image: python:3.12-slim
  script:
    - pip install --upgrade pip
    - pip install -e .
    - pip install -r docs/requirements.txt
    - sphinx-build -b html docs public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# PyPI publishing happens via .github/workflows/publish.yml (trusted
# publishing/OIDC, on the GitHub push mirror) instead of a GitLab job here -
# it doesn't need a long-lived PYPI_API_TOKEN, and running both would race
# on every tag push (whichever runs second always fails, since PyPI never
# allows re-uploading files for an already-published version).
