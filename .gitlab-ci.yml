stages:
  - test
  - deploy

test:
  stage: test
  image: continuumio/miniconda3:latest
  before_script:
    - apt-get update --fix-missing && apt-get install -y gcc make g++
    - conda env create -f ci/conda_env.yml
  script:
    - source activate marapendi
    - pip install .
    - python -c "import marapendi; print('OK')"
    - pytest --cov=marapendi

pages:
  stage: deploy
  image: python:3.12-slim
  script:
    - pip install --upgrade pip
    - pip install -e .
    - pip install -r docs/requirements.txt
    - sphinx-build -b html docs public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
