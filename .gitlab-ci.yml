stages:
  - build
  - test
  - deploy

variables:
  # Non-TLS dind: TLS would need the runner's config.toml to mount a shared
  # /certs volume between the job and the docker:dind service, which this
  # runner isn't set up for (docker build fails with
  # "open /certs/client/ca.pem: no such file or directory" otherwise).
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -f ci/Dockerfile -t marapendi:ci .
    - docker save marapendi:ci -o marapendi-ci.tar
  artifacts:
    paths:
      - marapendi-ci.tar
    expire_in: 1 hour

test:
  stage: test
  image: docker:latest
  services:
    - docker:dind
  needs: ["build"]
  script:
    - docker load -i marapendi-ci.tar
    - docker run marapendi:ci python -c "import marapendi; print('OK')"
    - docker run marapendi:ci pytest --cov=marapendi

pages:
  stage: deploy
  image: python:3.12-slim
  script:
    - pip install --upgrade pip
    - pip install -e .
    - pip install -r docs/requirements.txt
    - sphinx-build -b html docs public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
